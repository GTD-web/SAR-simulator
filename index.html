<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumir SAR Simulator</title>
  <!-- CesiumJS CSS -->
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <!-- 애플리케이션 CSS -->
  <link rel="stylesheet" href="./styles.css">
  <!-- 프로토타입 로드 전 POC 화면 숨김 -->
  <style>
    #sidebar { visibility: hidden; }
    #swathGroupsSidebar, #signalResultsSidebar { display: none !important; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  
  <!-- 사이드바 -->
  <div id="sidebar">
    <div id="sidebarHeader">
    </div>
    <div id="sidebarContent">
    </div>
  </div>
  
  <!-- 두 번째 사이드바: Swath 그룹 관리 -->
  <div id="swathGroupsSidebar" class="collapsed">
    <div id="swathGroupsHeader">
      <h2>Swath 그룹</h2>
      <button id="swathGroupsCloseBtn" class="swath-groups-close-btn">×</button>
    </div>
    <div id="swathGroupsContent">
      <div id="swathGroupsList">
        <!-- 그룹 목록이 동적으로 표시됨 -->
      </div>
    </div>
  </div>
  
  <!-- 세 번째 사이드바: Signal 시뮬레이션 결과 -->
  <div id="signalResultsSidebar" class="collapsed">
    <div id="signalResultsHeader">
      <h2>Signal 결과</h2>
      <button id="signalResultsCloseBtn" class="signal-results-close-btn">×</button>
    </div>
    <div id="signalResultsContent">
      <!-- SAR Signal (Chirp) -->
      <div class="signal-section" style="margin-bottom: 20px;">
        <h5 style="color: #fff; font-size: 13px; margin-bottom: 10px;">SAR Signal (Chirp)</h5>
        <canvas id="chirpSignalCanvas" width="370" height="400" style="width: 100%; height: auto; background: #1e1e1e; border: 1px solid #444;"></canvas>
        <div id="chirpStatistics" style="margin-top: 10px;"></div>
      </div>
      
      <!-- 상세 Chirp Signal 그래프 (Time Domain with Carrier Frequency) -->
      <div class="signal-section" style="margin-top: 20px; margin-bottom: 20px;">
        <h5 style="color: #fff; font-size: 13px; margin-bottom: 10px;">상세 Chirp Signal 분석</h5>
        <canvas id="detailedChirpCanvas" width="370" height="400" style="width: 100%; height: auto; background: #1e1e1e; border: 1px solid #444; display: none;"></canvas>
      </div>
      
      <!-- Echo Signal -->
      <div class="signal-section" style="margin-top: 20px;">
        <h5 style="color: #fff; font-size: 13px; margin-bottom: 10px;">Echo Signal</h5>
        <canvas id="echoSignalCanvas" width="370" height="350" style="width: 100%; height: auto; background: #1e1e1e; border: 1px solid #444;"></canvas>
        <div id="echoStatistics" style="margin-top: 10px;"></div>
      </div>
    </div>
  </div>
  
  <!-- Canvas 확대 보기 모달 -->
  <div id="canvasModal" class="canvas-modal" style="display: none;">
    <div class="canvas-modal-content">
      <div class="canvas-modal-header">
        <h3 id="canvasModalTitle">Signal 확대 보기</h3>
        <button id="canvasModalClose" class="canvas-modal-close">×</button>
      </div>
      <div class="canvas-modal-body">
        <canvas id="canvasModalCanvas"></canvas>
      </div>
    </div>
  </div>
  
  <!-- Satellite.js 라이브러리 (TLE 파싱 및 SGP4 계산용) -->
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.2/dist/satellite.min.js"></script>
  
  <!-- CesiumJS JavaScript -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.137/Build/Cesium/Cesium.js"></script>
  <script type="module">
    // Cesium ion access token 설정
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIwZjEzNDA2OC05MTE2LTQ2ODgtOGJiYi05MDFjNzc2ZDg0NDIiLCJpZCI6MjE1NTM4LCJpYXQiOjE3NjkxNjM4MjB9.-JMo-431f4Bkr6NdfcU8y7WFo0ZTi1BxDInRWHWJhtE';

    // 클래스 모듈 import
    import { App } from './App.js';
    
    // 모듈 로딩 오류 처리
    window.addEventListener('error', (e) => {
      if (e.message.includes('Failed to fetch dynamically imported module')) {
        console.error('모듈 로딩 오류:', e);
      }
    });

    // ==================== 애플리케이션 시작 ====================
    // App 인스턴스 생성 및 초기화 (프로토타입 화면으로 바로 로드)
    const app = new App();
    app.initialize();

    // 탭 전환 기능
    const tabButtons = document.querySelectorAll('.tab-button');
    const tabContents = document.querySelectorAll('.tab-content');
    
    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        const targetTab = button.getAttribute('data-tab');
        
        // 모든 탭 버튼과 콘텐츠에서 active 클래스 제거
        tabButtons.forEach(btn => btn.classList.remove('active'));
        tabContents.forEach(content => content.classList.remove('active'));
        
        // 클릭한 탭 버튼과 해당 콘텐츠에 active 클래스 추가
        button.classList.add('active');
        const targetContent = document.getElementById(targetTab + 'Tab');
        if (targetContent) {
          targetContent.classList.add('active');
        }
      });
    });

    // 위성 생성 모드 전환
    const satelliteModeSelect = document.getElementById('satelliteMode');
    const positionVelocityInput = document.getElementById('positionVelocityInput');
    const tleInput = document.getElementById('tleInput');
    
    if (satelliteModeSelect && positionVelocityInput && tleInput) {
      satelliteModeSelect.addEventListener('change', () => {
        const mode = satelliteModeSelect.value;
        if (mode === 'position_velocity') {
          positionVelocityInput.style.display = 'block';
          tleInput.style.display = 'none';
        } else {
          positionVelocityInput.style.display = 'none';
          tleInput.style.display = 'block';
        }
      });
    }
// ==================== [수치 기억하기: 절대 방어 버전] ====================
    // 1. 사용자가 새로고침(F5)을 누르는 '바로 그 순간' 화면의 모든 값을 금고에 싹 다 저장!
    window.addEventListener('beforeunload', () => {
      const inputs = document.querySelectorAll('#sidebarContent input, #sidebarContent select, #sidebarContent textarea');
      inputs.forEach(input => {
        if (input.id) {
          const valueToSave = input.type === 'checkbox' ? input.checked : input.value;
          localStorage.setItem('sar_sim_final_' + input.id, valueToSave);
        }
      });
    });

    // 2. 새로고침 후, App.js가 기본값 세팅을 다 끝낼 때까지 1.5초(1500ms) 기다렸다가 기습 덮어쓰기!
    setTimeout(() => {
      const inputs = document.querySelectorAll('#sidebarContent input, #sidebarContent select, #sidebarContent textarea');
      inputs.forEach(input => {
        if (!input.id) return;
        
        const savedValue = localStorage.getItem('sar_sim_final_' + input.id);
        if (savedValue !== null) {
          if (input.type === 'checkbox') {
            input.checked = (savedValue === 'true');
          } else {
            input.value = savedValue;
          }
          // 시뮬레이터 본체에게 "야! 나 값 바꿨어 작동해!" 라고 강제로 신호 보내기
          input.dispatchEvent(new Event('input', { bubbles: true }));
          input.dispatchEvent(new Event('change', { bubbles: true }));
        }
      });
    }, 1500); // 1.5초 대기
    // =========================================================================
  
  </script>
</body>
</html>
